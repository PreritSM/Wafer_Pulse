name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: |
          ruff format --check
          ruff check

      - name: Unit tests
        run: python -m unittest discover -s tests

  pr-auc-gate:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    env:
      WAFER_PROJECT_PR_AUC_BASELINE: ${{ vars.WAFER_PROJECT_PR_AUC_BASELINE }}
      CURRENT_PR_AUC: ${{ vars.WAFER_PROJECT_CURRENT_PR_AUC }}
    steps:
      - name: Validate PR-AUC against baseline
        run: |
          python - <<'PY'
          import os
          baseline = float(os.getenv("WAFER_PROJECT_PR_AUC_BASELINE", "0"))
          current = float(os.getenv("CURRENT_PR_AUC", "0"))
          if current < baseline:
              raise SystemExit(f"PR-AUC gate failed: current={current}, baseline={baseline}")
          print(f"PR-AUC gate passed: current={current}, baseline={baseline}")
          PY
