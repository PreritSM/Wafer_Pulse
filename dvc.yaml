stages:
  data_preparation:
    cmd: python src/pipeline_02_data_preparation.py
    deps:
      - src/pipeline_02_data_preparation.py
      - config/params.yaml
    outs:
      - data/Artifacts/Data_load_info.txt

  data_preprocessing:
    cmd: python src/pipeline_03_data_preprocessing.py
    deps:
      - src/pipeline_03_data_preprocessing.py
      - config/params.yaml
    outs:
      - data/Artifacts/Missing_value_processing.txt

  feature_normalization:
    cmd: python src/pipeline_04_feature_normalize_std.py
    deps:
      - src/pipeline_04_feature_normalize_std.py
      - config/params.yaml
    outs:
      - data/Artifacts/feature_scaler.pkl

  feature_selection:
    cmd: python src/pipeline_05_feature_selection.py
    deps:
      - src/pipeline_05_feature_selection.py
      - config/params.yaml
    outs:
      - data/Artifacts/feature_selection_report.txt


  model_training:
    cmd: python src/pipeline_06_model_training.py
    deps:
      - src/pipeline_06_model_training.py
      - config/params.yaml
    outs:
      - data/Artifacts/model_training_report.txt
      - models/best_model.pkl

  model_inference:
    cmd: python src/pipeline_07_model_inference.py --dummy_data
    deps:
      - src/pipeline_07_model_inference.py
      - config/params.yaml
    outs:
      # - data/Artifacts/model_inference_report.txt
      - data/Prediction_Output_File/Predictions.csv