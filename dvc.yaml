stages:
  data_preparation:
    cmd: python src/pipeline_02_data_preparation.py
    deps:
      - src/pipeline_02_data_preparation.py
      - config/params.yaml
    outs:
      - data/Artifacts/Data_load_info.txt

  data_preprocessing:
    cmd: python src/pipeline_03_data_preprocessing.py
    deps:
      - src/pipeline_03_data_preprocessing.py
      - config/params.yaml
    outs:
      - data/Artifacts/Missing_value_processing.txt

  feature_normalization:
    cmd: python src/pipeline_04_feature_normalize_std.py
    deps:
      - src/pipeline_04_feature_normalize_std.py
      - config/params.yaml
    outs:
      - data/Artifacts/feature_scaler.pkl

  feature_selection:
    cmd: python src/pipeline_05_feature_selection.py
    deps:
      - src/pipeline_05_feature_selection.py
      - config/params.yaml
    outs:
      - data/Artifacts/feature_selection_report.txt